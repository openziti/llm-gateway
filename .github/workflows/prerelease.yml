name: Pre-Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux:
    name: build-linux-${{ matrix.arch.goreleaser }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch:
          - goreleaser: amd64
          - goreleaser: arm64
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --skip=publish --config .goreleaser-linux-${{ matrix.arch.goreleaser }}.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-builds-linux-${{ matrix.arch.goreleaser }}
          path: ./dist/*.gz

  build-darwin:
    name: build-darwin
    runs-on: macos-14
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --skip=publish --config .goreleaser-darwin.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-builds-darwin
          path: ./dist/*.gz

  build-windows:
    name: build-windows
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --skip=publish --config .goreleaser-windows.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-builds-windows
          path: ./dist/*.gz

  draft-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-darwin
      - build-windows
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p ./dist

      - name: Fetch Source Archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/tarball/${{ github.ref_name }} \
            > ./dist/source-${{ github.ref_name }}.tar.gz

      - name: Build SBOM from Dependency Graph as SPDX JSON
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/dependency-graph/sbom \
            | tee ./dist/sbom-${{ github.ref_name }}.spdx.json

      - uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true
          pattern: release-builds-*

      - name: Create Checksum Files
        shell: bash
        run: |

          ls -lAR ./dist/

          # create checksum file for the release
          cd ./dist/
          shasum --algorithm 256 ./* | tee ./checksums.sha256.txt

      - name: Draft Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --config .goreleaser-release.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

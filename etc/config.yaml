# llm-gateway configuration

listen: ":8080"

zrok:
  share:
    enabled: false
    mode: private  # public or private
    # token: "abc123"  # optional: use existing persistent share (private only)

providers:
  open_ai:
    api_key: "${OPENAI_API_KEY}"
    # base_url: "https://api.openai.com"  # optional: override for Azure or proxies
    # zrok_share_token: "abc123"  # optional: connect via zrok share

  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    # base_url: "https://api.anthropic.com"  # optional: override base URL
    # zrok_share_token: "abc123"  # optional: connect via zrok share

  ollama:
    base_url: "http://localhost:11434"
    # zrok_share_token: "abc123"  # optional: connect via zrok share

    # multi-endpoint mode (replaces base_url/zrok_share_token above):
    # endpoints:
    #   - name: gpu-box-1
    #     base_url: "http://10.0.0.1:11434"
    #   - name: gpu-box-2
    #     base_url: "http://10.0.0.2:11434"
    #   - name: remote
    #     zrok_share_token: "abc123"
    # health_check:
    #   interval_seconds: 30
    #   timeout_seconds: 5

# api key authentication
# when enabled, clients must send an Authorization: Bearer <key> header.
# /health and /metrics are exempt from authentication.
# api_keys:
#   enabled: true
#   keys:
#     - name: alice
#       key: "sk-gw-..."                       # generate with: llm-gateway genkey
#       allowed_models: ["claude-*", "gpt-*"]   # optional: glob patterns (default: all)
#       allowed_routes: ["coding", "general"]   # optional: semantic route names (default: all)
#     - name: ci-pipeline
#       key: "${CI_GATEWAY_KEY}"                # supports env var substitution
#       allowed_models: ["*"]

# metrics configuration
# metrics:
#   enabled: true
#   listen: ":9090"  # optional: separate metrics server address

# semantic routing configuration
# when enabled, the model field becomes optional in requests.
# requests are routed through a three-layer cascade: heuristics -> embeddings -> classifier.
